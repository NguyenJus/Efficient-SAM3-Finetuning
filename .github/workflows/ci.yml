name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd             # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@3b9817b1bf26186f03ab8277bab9b827ea5cc254           # v3.2.0
        with:
          enable-cache: true

      - name: Set Python version
        run: uv python install 3.13

      - name: Install deps
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check

      - name: Format check
        run: uv run ruff format --check

      - name: Type check
        run: uv run mypy src/esam3

      - name: Test
        run: uv run pytest

      - name: Upload coverage HTML
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882      # v4.4.3
        if: always()
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 3

  lock-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd             # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@3b9817b1bf26186f03ab8277bab9b827ea5cc254           # v3.2.0
        with:
          enable-cache: true

      - name: uv lock --check
        run: uv lock --check

  lint-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd             # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@3b9817b1bf26186f03ab8277bab9b827ea5cc254           # v3.2.0
        with:
          enable-cache: true

      - name: Install actionlint
        run: |
          bash <(curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.7/scripts/download-actionlint.bash) 1.7.7

      - name: actionlint
        run: ./actionlint -color

      - name: yamllint
        run: uv run --with yamllint yamllint .

      - name: markdownlint
        run: npx --yes markdownlint-cli2 "**/*.md" "#node_modules"

      - name: shellcheck
        run: shellcheck scripts/*.sh
